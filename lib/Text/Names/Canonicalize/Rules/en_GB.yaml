---
# English (United Kingdom) name canonicalization rules
#
# Notes:
#   - UK names rarely use particles (unlike French, Dutch, German).
#   - Hyphenated given names and surnames are common and should be preserved.
#   - Titles such as "Sir", "Dame", "Lord", "Lady" are culturally significant
#     and must be stripped before canonicalization.
#   - Suffixes are uncommon but do appear (e.g., "III", "Jr" in some families).

default:

  # No surname particles in standard UK naming.
  particles: []

  # Common UK suffixes.
  suffixes:
    - jr
    - sr
    - ii
    - iii
    - iv

  # Titles to strip from the beginning of the name.
  strip_titles:
    - mr
    - mrs
    - miss
    - ms
    - sir
    - dame
    - dr
    - prof
    - lord
    - lady

  # Preserve hyphens in given names and surnames.
  hyphen_policy: preserve

  # UK surnames are typically the last token.
  surname_strategy: last_token_with_particles
